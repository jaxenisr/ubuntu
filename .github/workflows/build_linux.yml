name: Build Linux App
on:
  workflow_dispatch:
  pull_request:
    branches:
      - main

jobs:
  build-linux:
    name: Build Linux release bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.24.2'

      - name: Setup JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Enable Linux desktop support
        run: flutter config --enable-linux-desktop

      - name: Install Linux build dependencies
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev pkg-config libayatana-appindicator3-dev

      - name: Install packages
        run: flutter pub get

      - name: Linter
        run: flutter analyze

      - name: Build Linux release
        run: flutter build linux --release

      - name: Install flutter_distributor
        run: |
          dart pub global activate flutter_distributor
          echo "PATH=\$HOME/.pub-cache/bin:\$PATH" >> $GITHUB_ENV

      - name: Package Linux AppImage and DEB
        run: |
          flutter_distributor package --platform linux --targets deb,appimage

      - name: Upload Linux packages
        uses: actions/upload-artifact@v4
        with:
          name: Harmony music linux packages
          path: dist/**/*.{deb,AppImage}
