name: Build Windows exe 
on: workflow_dispatch
  
jobs:

  build-windows-exe:
    runs-on: windows-2022
    
    steps:
      - uses: actions/checkout@v3
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.24.2'
      
      - name: Install InnoSetup if missing
        run: |
          if (-not (Get-Command "innosetup" -ErrorAction SilentlyContinue)) {
            choco install innosetup -y
          } else {
            Write-Output "InnoSetup already installed."
          }

      - name: Update lang data
        working-directory: "${{ github.workspace }}"
        run: dart localization/generator.dart

      - name: Set update check flag to true
        working-directory: "${{ github.workspace }}/lib/utils"
        run: echo "const updateCheckFlag = true;" > update_check_flag_file.dart
        
      - name: Build windows exe package
        working-directory: "${{ github.workspace }}"
        run: |
          flutter clean
          dart pub global activate flutter_distributor
          flutter_distributor package --platform windows --targets exe

      - name: Find first .exe file
        id: find_exe
        run: |
          $lastSubDir = Get-ChildItem -Path "${{ github.workspace }}/dist" -Directory | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          $exeFile = Get-ChildItem -Path "$($lastSubDir.FullName)/*.exe" | Select-Object -First 1
          if ($exeFile) {
              Write-Output "Found .exe file: $($exeFile.FullName)"
              "exe_path=$($exeFile.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          } else {
              Write-Error "No .exe files found in the dist directory."
              exit 1
          }
          
      - name: Set up osslsigncode
        if: ${{ secrets.SIGNING_PFX_B64 != '' }}
        run: |
          Invoke-WebRequest -Uri "https://github.com/mtrojnar/osslsigncode/releases/download/2.9/osslsigncode-2.9-windows-x64-mingw.zip" -OutFile "osslsigncode.zip"
          Expand-Archive -Path "osslsigncode.zip" -DestinationPath "osslsigncode"
          Add-Content -Path $env:GITHUB_PATH -Value "${{ github.workspace }}\osslsigncode"
      
      - name: Make signing dir
        if: ${{ secrets.SIGNING_PFX_B64 != '' }}
        working-directory: "${{ github.workspace }}"
        run: mkdir signed

      - name: Add signing PFX
        if: ${{ secrets.SIGNING_PFX_B64 != '' }}
        working-directory: "${{ github.workspace }}/signed"
        run: |
          $b64 = "${{ secrets.SIGNING_PFX_B64 }}".Trim()
          $bytes = [System.Convert]::FromBase64String($b64)
          [System.IO.File]::WriteAllBytes("signing_cert.pfx", $bytes)
          cp "${{ github.workspace }}/win_cert/DigiCertGlobalRootCA.crt" .

      - name: Signing secret not set (informational)
        if: ${{ secrets.SIGNING_PFX_B64 == '' }}
        run: Write-Output "SIGNING_PFX_B64 is not set — skipping signing steps."

      - name: Sign executable (use PFX)
        if: ${{ secrets.SIGNING_PFX_B64 != '' }}
        working-directory: "${{ github.workspace }}/signed"
        run: |
          $exePath = "${{ steps.find_exe.outputs.exe_path }}"
          $signedExePath = "$exePath".Replace(".exe", "_signed.exe")
          & "${{ github.workspace }}/osslsigncode/bin/osslsigncode.exe" sign -pkcs12 signing_cert.pfx -pass "${{ secrets.SIGNING_PFX_PASSWORD }}" -t http://timestamp.digicert.com -in "$exePath" -out "$signedExePath"

      - name: Verify signature
        if: ${{ secrets.SIGNING_PFX_B64 != '' }}
        working-directory: "${{ github.workspace }}/signed"
        run: |
          $signedExePath = "${{ steps.find_exe.outputs.exe_path }}".Replace(".exe", "_signed.exe")
          & "${{ github.workspace }}/osslsigncode/bin/osslsigncode.exe" verify -in "$signedExePath" -TSA-CAfile DigiCertGlobalRootCA.crt
          
      - name: Upload signed Windows exe artifact
        if: ${{ secrets.SIGNING_PFX_B64 != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: Harmony music windows exe (signed)
          path: "${{ github.workspace }}/dist/**/*_signed.exe"

      - name: Upload unsigned Windows exe artifact
        if: ${{ secrets.SIGNING_PFX_B64 == '' }}
        uses: actions/upload-artifact@v4
        with:
          name: Harmony music windows exe (unsigned)
          path: "${{ github.workspace }}/dist/**/*.exe"
